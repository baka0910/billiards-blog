<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c14"/>
      <stop offset="50%" style="stop-color:#12203a"/>
      <stop offset="100%" style="stop-color:#0f1928"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.04)"/>
    </pattern>
  </defs>
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- 左上グロー -->
  <circle cx="200" cy="200" r="300" fill="rgba(233,69,96,0.08)"/>
  <!-- 右下グロー -->
  <circle cx="1000" cy="430" r="250" fill="rgba(168,216,234,0.06)"/>
  <!-- 下ボーダーライン -->
  <rect x="0" y="620" width="1200" height="10" fill="#e94560"/>
  <!-- ビリヤードボール -->
  <circle cx="120" cy="315" r="60" fill="#1a1a2e" stroke="#e94560" stroke-width="3"/>
  <circle cx="120" cy="315" r="50" fill="#e94560"/>
  <text x="120" y="328" font-family="Arial Black" font-size="42" font-weight="900" fill="white" text-anchor="middle">8</text>
  <!-- メインタイトル -->
  <text x="210" y="280" font-family="Arial Black, sans-serif" font-size="88" font-weight="900" letter-spacing="4" fill="#e94560">BILLIARD</text>
  <text x="210" y="370" font-family="Arial Black, sans-serif" font-size="88" font-weight="900" letter-spacing="4" fill="#a8d8ea">NEWS WEEKLY</text>
  <!-- サブタイトル -->
  <text x="210" y="420" font-family="Arial, sans-serif" font-size="28" fill="#6a8faa" letter-spacing="6">世界のビリヤードニュースを毎週日曜に配信</text>
  <!-- 地域タグ -->
  <rect x="210" y="460" width="160" height="40" rx="20" fill="rgba(91,154,255,0.15)" stroke="#5b9aff" stroke-width="1.5"/>
  <text x="290" y="486" font-family="Arial Black" font-size="18" font-weight="900" fill="#5b9aff" text-anchor="middle">🇪🇺 EUROPE</text>
  <rect x="385" y="460" width="220" height="40" rx="20" fill="rgba(255,123,123,0.15)" stroke="#ff7b7b" stroke-width="1.5"/>
  <text x="495" y="486" font-family="Arial Black" font-size="18" font-weight="900" fill="#ff7b7b" text-anchor="middle">🇺🇸 NORTH AMERICA</text>
  <rect x="620" y="460" width="130" height="40" rx="20" fill="rgba(107,223,170,0.15)" stroke="#6bdfaa" stroke-width="1.5"/>
  <text x="685" y="486" font-family="Arial Black" font-size="18" font-weight="900" fill="#6bdfaa" text-anchor="middle">🌏 ASIA</text>
  <rect x="765" y="460" width="130" height="40" rx="20" fill="rgba(240,192,64,0.15)" stroke="#f0c040" stroke-width="1.5"/>
  <text x="830" y="486" font-family="Arial Black" font-size="18" font-weight="900" fill="#f0c040" text-anchor="middle">🇯🇵 JAPAN</text>
  <!-- URL -->
  <text x="210" y="580" font-family="Arial, sans-serif" font-size="22" fill="#334455" letter-spacing="2">baka0910.github.io/billiards-blog</text>
</svg>
